<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Maatha App - Maternal and Infant Healthcare">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Maatha App">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Maatha App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    /* ===== Floating Chatbot (Web Only) ============================= */
    :root {
      --bot-accent: #aa44ff;
      --bot-pink:   #ff4488;
      --bot-dark:   #1a1035;
    }

    #chatbot-fab {
      position: fixed;
      bottom: 28px;
      right: 24px;
      width: 64px;
      height: 64px;
      z-index: 9999;
      cursor: pointer;
      border: none;
      background: transparent;
      padding: 0;
    }

    #chatbot-fab-inner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #9c6fe0, #4a148c);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      box-shadow: 0 6px 24px rgba(106, 17, 203, 0.55),
                  0 0 0 0 rgba(170, 68, 255, 0.5);
      animation: fabPulse 1.6s ease-in-out infinite;
      transition: transform 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    #chatbot-fab-inner::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 10px;
      width: 18px;
      height: 10px;
      background: rgba(255,255,255,0.22);
      border-radius: 8px;
    }

    #chatbot-fab-inner .orbit {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid rgba(224, 64, 251, 0.65);
      border-top-color: transparent;
      border-bottom-color: transparent;
      animation: orbitSpin 3s linear infinite;
    }

    @keyframes fabPulse {
      0%, 100% { box-shadow: 0 6px 24px rgba(106,17,203,0.55), 0 0 0 0 rgba(170,68,255,0.4); }
      50%       { box-shadow: 0 8px 32px rgba(106,17,203,0.65), 0 0 0 10px rgba(170,68,255,0); }
    }
    @keyframes orbitSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #chatbot-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 72vh;
      max-height: 680px;
      background: var(--bot-dark);
      border-radius: 28px 28px 0 0;
      box-shadow: 0 -12px 50px rgba(0,0,0,0.55);
      z-index: 9998;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.42s cubic-bezier(0.22, 0.61, 0.36, 1);
      overflow: hidden;
    }

    #chatbot-panel.open {
      transform: translateY(0);
    }

    #chatbot-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9997;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    #chatbot-backdrop.visible {
      opacity: 1;
      pointer-events: all;
    }

    .chatbot-handle {
      width: 44px;
      height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      margin: 12px auto 6px;
    }

    .chatbot-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      background: linear-gradient(90deg, #6a11cb 0%, #d44060 100%);
      flex-shrink: 0;
    }

    .chatbot-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .chatbot-info { flex: 1; }
    .chatbot-name {
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      font-family: system-ui, sans-serif;
    }

    .chatbot-status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .chatbot-dot {
      width: 8px;
      height: 8px;
      background: #69ff47;
      border-radius: 50%;
    }

    .chatbot-online-text {
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      font-family: system-ui, sans-serif;
    }

    .chatbot-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #chatbot-iframe {
      flex: 1;
      border: none;
      width: 100%;
      background: var(--bot-dark);
    }

    #chatbot-loader {
      position: absolute;
      inset: 0;
      background: var(--bot-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: rgba(255,255,255,0.7);
      font-family: system-ui, sans-serif;
      font-size: 14px;
      z-index: 1;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(224,64,251,0.3);
      border-top-color: #e040fb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Flutter app -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- ===== Floating Chatbot (Web) ================================= -->
  <!-- Backdrop -->
  <div id="chatbot-backdrop" onclick="toggleChat()"></div>

  <!-- FAB Button -->
  <button id="chatbot-fab" onclick="toggleChat()" aria-label="Open midwife chat assistant">
    <div id="chatbot-fab-inner">
      <div class="orbit"></div>
      <span id="fab-icon">🫀</span>
    </div>
  </button>

  <!-- Chat Panel -->
  <div id="chatbot-panel" role="dialog" aria-label="Sarah Midwife Assistant">
    <div class="chatbot-handle"></div>
    <div class="chatbot-header">
      <div class="chatbot-avatar">👩‍⚕️</div>
      <div class="chatbot-info">
        <div class="chatbot-name">Sarah · Midwife Assistant</div>
        <div class="chatbot-status">
          <div class="chatbot-dot"></div>
          <span class="chatbot-online-text">Online now</span>
        </div>
      </div>
      <button class="chatbot-close" onclick="toggleChat()" aria-label="Close chat">✕</button>
    </div>

    <div style="position:relative; flex:1; display:flex; flex-direction:column;">
      <div id="chatbot-loader">
        <div class="spinner"></div>
        <span>Sarah is waking up…</span>
      </div>
      <iframe
        id="chatbot-iframe"
        src="https://wgkpramuditha-maternal-health-bot.hf.space"
        frameborder="0"
        title="Sarah Midwife Assistant"
        onload="document.getElementById('chatbot-loader').style.display='none'"
      ></iframe>
    </div>
  </div>

  <script>
    var chatOpen = false;

    function toggleChat() {
      chatOpen = !chatOpen;
      var panel    = document.getElementById('chatbot-panel');
      var backdrop = document.getElementById('chatbot-backdrop');
      var fabIcon  = document.getElementById('fab-icon');

      if (chatOpen) {
        panel.classList.add('open');
        backdrop.classList.add('visible');
        fabIcon.textContent = '✕';
      } else {
        panel.classList.remove('open');
        backdrop.classList.remove('visible');
        fabIcon.textContent = '🫀';
      }
    }
  </script>
</body>
</html>
